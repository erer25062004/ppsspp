name: Manual Generate Android APK
on:
  workflow_dispatch:
    inputs:
      buildVariant:
        type: choice
        description: 'Build Variant'
        required: true
        default: 'NormalOptimized'
        options: 
        - NormalOptimized
        - NormalDebug
        - VROptimized
        - VRDebug
        - LegacyOptimized

jobs:
  apk:
    name: Generate ${{ github.event.inputs.buildVariant }} APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Check Valid Version Tags
        id: valid-tags
        shell: bash
        run: |
          echo "count=$(git tag -l 'v[0-9]*' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Fetch upstream tags
        if: steps.valid-tags.outputs.count == '0'
        run: |
          git remote add upstream https://github.com/hrydgard/ppsspp.git
          git fetch --deepen=15000 --no-recurse-submodules --tags --force upstream || exit 0
        
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Assemble APK
        # Menggunakan flag resmi PPSSPP tanpa memanggil task lama yang sudah dihapus
        run: ./gradlew assembleRelease --parallel --build-cache
      
      - name: Package build
        run: |
          find . -name "*.apk"
          mkdir ppsspp
          if [ -e android/build/*/apk/*/*/*.apk ]; then
            cp android/build/*/apk/*/*/*.apk ppsspp/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ github.event.inputs.buildVariant }} build
          path: ppsspp/
