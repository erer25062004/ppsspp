name: Manual Generate Android APK
on:
  workflow_dispatch:
    inputs:
      buildVariant:
        type: choice
        description: 'Build Variant'
        required: true
        default: 'NormalOptimized'
        options: 
        - NormalOptimized
        - NormalDebug
        - VROptimized
        - VRDebug
        - LegacyOptimized

jobs:
  apk:
    name: Generate ${{ github.event.inputs.buildVariant }} APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Check Valid Version Tags
        id: valid-tags
        shell: bash
        run: |
          echo "count=$(git tag -l 'v[0-9]*' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Fetch upstream tags
        if: steps.valid-tags.outputs.count == '0'
        run: |
          git remote add upstream https://github.com/hrydgard/ppsspp.git
          git fetch --deepen=15000 --no-recurse-submodules --tags --force upstream || exit 0
        
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Assemble APK
        # Menggunakan flag resmi PPSSPP tanpa memanggil task lama yang sudah dihapus
        run: ./gradlew assembleRelease --parallel --build-cache
      
      - name: Package build
        run: |
          mkdir -p ppsspp
          
          echo "=== MEMULAI PENCARIAN APK ==="
          # Jalur 1: Cek folder output standar Android Gradle terbaru
          if [ -d android/app/build/outputs/apk ]; then
            find android/app/build/outputs/apk/ -name "*.apk" -exec cp {} ppsspp/ \;
          fi
          
          # Jalur 2: Cek folder build Android secara luas
          if [ -d android/build ]; then
            find android/build/ -name "*.apk" -exec cp {} ppsspp/ \;
          fi
          
          # Jalur 3: Sapu bersih seluruh root directory jika jalur 1 & 2 meleset
          find . -type f -name "*.apk" -not -path "./ppsspp/*" -exec cp {} ppsspp/ \;
          
          echo "=== ISI FOLDER PPSSPP YANG SIAP DI-UPLOAD ==="
          ls -la ppsspp/
          
          # JAMINAN 100%: Jika folder ppsspp ternyata kosong (APK gagal dicopy), 
          # script akan dipaksa MERAH/ERROR saat itu juga agar kita tahu sistemnya gagal.
          if [ -z "$(ls -A ppsspp)" ]; then
            echo "ERROR: File APK PPSSPP tidak ditemukan di folder mana pun!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-${{ github.event.inputs.buildVariant }} build
          path: ppsspp/
